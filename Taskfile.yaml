version: '3'  

vars:
  CONDA_ENV: harmony
  PYTHON_CMD: "conda run --no-capture-output -n {{.CONDA_ENV}} python"
  PYTEST_CMD: "conda run --no-capture-output -n {{.CONDA_ENV}} pytest"
  DOCKER_CMD: "docker compose --project-directory . --env-file infra/docker/.env -f infra/docker/docker-compose.yaml"

tasks:
  default:
    silent: true
    cmds:
      - task --list-all

  # --------------------------------------------------------------------------
  # 1. SETUP & CONFIGURATION
  # --------------------------------------------------------------------------

  setup:
    desc: "🚀 SETUP: the development environment"
    summary: |
      1. Creates the 'harmony' Conda environment.
      2. Installs the backend in editable mode.
      3. Installs frontend Node modules.
    cmds:
      - task: setup:conda
      - task: setup:backend
      - task: setup:frontend
    status:
      - test -d frontend/node_modules
      - conda env list | grep {{.CONDA_ENV}}

  setup:conda:
    desc: "🚀 SETUP CONDA: Create/Sync Conda environment"
    cmds:
      - conda env create -f environment.yaml || echo "Env likely exists, updating..."
      - conda env update --name {{.CONDA_ENV}} --file environment.yaml --prune
  
  setup:backend:
    internal: true
    desc: "Install Backend Dependencies"
    cmds:
      - "{{.PYTHON_CMD}} -m pip install -e backend"

  setup:frontend:
    internal: true
    desc: "Install Frontend Dependencies"
    dir: frontend
    cmds:
      - npm install

  # --------------------------------------------------------------------------
  # 2. RUNNING THE APP
  # --------------------------------------------------------------------------

  docker:render:
    desc: "⚙️  RENDER: Generate all config files from infra/docker/config.yaml"
    cmds:
      - "{{.PYTHON_CMD}} infra/scripts/render_config.py infra/docker/config.yaml infra/templates infra/docker/config"
      - "{{.PYTHON_CMD}} infra/scripts/render_config.py infra/docker/config.yaml infra/docker/templates infra/docker"

  run:dev:
    desc: "▶️  START DEV: Runs the local dev environment"
    cmds:
      - task: docker:render
      - "{{.DOCKER_CMD}} up --build"
      
  clean:
    desc: "🛑 STOP: Stops all containers and removes volumes"
    cmds:
      - "{{.DOCKER_CMD}} down --volumes --remove-orphans"
        
  build:
    desc: "🚀 BUILD: the docker compose environment"
    cmds:
      - task: docker:render
      - "{{.DOCKER_CMD}} build"

  # --------------------------------------------------------------------------
  # 3. TESTING
  # --------------------------------------------------------------------------

  test:integration:
    desc: "🧪 Run integration tests"
    dir: backend/src/harmony/tests
    env:
      API_ENDPOINT: http://localhost:8000
    cmds:
      - "{{.PYTEST_CMD}} -m integration"

  test:stress:
    desc: "🧪 Run stress tests"
    dir: backend/src/harmony/tests
    env:
      API_ENDPOINT: http://localhost:8000
    cmds:
      - "{{.PYTEST_CMD}} -m stress -s -v"

  data:generate:
    desc: "🎲 GENERATE: dummy data for the DB"
    dir: backend/src/harmony/tests/tools
    cmds:
      - "{{.PYTEST_CMD}} generate.py -s"

  data:clean:
    desc: "🎲 CLEAN: up generated test data from the database"
    dir: backend/src/harmony/tests/tools
    cmds:
      - rm -f generated_data.json

  # --------------------------------------------------------------------------
  # 4. CODE GENERATION & SYNC
  # --------------------------------------------------------------------------

  schema:sync:
    desc: "🔄 SYNC: Updates Frontend SDK based on Backend Code"
    summary: |
      Use this when you change the FastAPI Pydantic models.
      1. Extracts OpenAPI JSON from Backend.
      2. Generates TypeScript clients using Orval.
    cmds:
      - "{{.PYTHON_CMD}} backend/specs/extract_openapi.py > frontend/openapi.json"
      - cd frontend && npx orval

  env:freeze:
    desc: "🔄 FREEZE: Update environment.yaml from current setup"
    cmds:
      - 'conda run -n {{.CONDA_ENV}} conda env export --no-builds | grep -v -e "prefix: " -e "harmony-chat-api" > environment.yaml'

  env:compile:
    desc: "🔄 COMPILE: generate requirements.txt from pyproject.toml"
    dir: backend
    cmds:
      - conda run -n {{.CONDA_ENV}} pip-compile pyproject.toml --output-file requirements.txt