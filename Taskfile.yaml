version: '3'

vars:
  PROJECT_NAME: '{{.PROJECT_NAME | default "harmony"}}'
  IMAGE_TAG: { sh: git rev-parse --short HEAD 2>/dev/null || echo "local" }
  PYTHON_CMD: "uv run"
  PYTEST_CMD: "uv run pytest"
  DOCKER_CMD: "docker compose --project-directory . --env-file infra/docker/env/.env -f infra/docker/docker-compose.yaml"

tasks:
  default: [task --list-all]

  setup:
    desc: "🚀 SETUP: dev env"
    cmds: [uv sync, cd frontend && npm install]

  run:
    desc: "▶️  START: local docker-compose"
    cmds: [task: docker:render, "{{.DOCKER_CMD}} up --build"]

  clean:
    desc: "🛑 STOP: local docker-compose"
    cmds: ["{{.DOCKER_CMD}} down --volumes --remove-orphans"]

  docker:render:
    dir: infra/
    cmds:
      - "{{.PYTHON_CMD}} scripts/render_config.py docker/config.yaml docker/templates/config docker/config"
      - "{{.PYTHON_CMD}} scripts/render_config.py docker/config.yaml docker/secrets.yaml docker/templates/envt docker/env"

  build:
    desc: "🐳 BUILD: backend image"
    cmds:
      - docker build -t {{.PROJECT_NAME}}-backend:local backend/
      - docker build -t init-dynamodb:local -f infra/docker/images/init-dynamodb/Dockerfile infra/

  kind:load:
    desc: "🐳 LOAD: images into kind"
    deps: [build]
    cmds:
      - kind load docker-image {{.PROJECT_NAME}}-backend:local --name {{.PROJECT_NAME}}
      - kind load docker-image init-dynamodb:local --name {{.PROJECT_NAME}}

  test:integration:
    desc: "🧪 Run integration tests"
    dir: backend/src/harmony/tests
    cmds: ["{{.PYTEST_CMD}} -n auto -m integration"]
