version: '3'  

vars:
  CONDA_ENV: harmony
  PYTHON_CMD: "conda run --no-capture-output -n {{.CONDA_ENV}} python"
  PYTEST_CMD: "conda run --no-capture-output -n {{.CONDA_ENV}} pytest"

  DOCKER_CMD: "docker compose --project-directory . --env-file infra/docker/env/.env -f infra/docker/docker-compose.yaml"

  KIND_CLUSTER: "harmony"
  K8S_ENV: "local"
  K8S_ENV_DIR: "infra/k8s/environments/{{.K8S_ENV}}"
  HELMFILE_CMD: "helmfile -e {{.K8S_ENV}}"

tasks:
  default:
    silent: true
    cmds:
      - task --list-all

  # --------------------------------------------------------------------------
  # 1. SETUP & CONFIGURATION
  # --------------------------------------------------------------------------

  setup:
    desc: "🚀 SETUP: the development environment"
    summary: |
      1. Creates the 'harmony' Conda environment.
      2. Installs the backend in editable mode.
      3. Installs frontend Node modules.
    cmds:
      - task: setup:conda
      - task: setup:backend
      - task: setup:frontend
    status:
      - test -d frontend/node_modules
      - conda env list | grep {{.CONDA_ENV}}

  setup:conda:
    desc: "🚀 SETUP CONDA: Create/Sync Conda environment"
    cmds:
      - conda env create -f environment.yaml || echo "Env likely exists, updating..."
      - conda env update --name {{.CONDA_ENV}} --file environment.yaml --prune
  
  setup:backend:
    internal: true
    desc: "Install Backend Dependencies"
    cmds:
      - "{{.PYTHON_CMD}} -m pip install -e backend"

  setup:frontend:
    internal: true
    desc: "Install Frontend Dependencies"
    dir: frontend
    cmds:
      - npm install

  # --------------------------------------------------------------------------
  # 2. DOCKER & LOCAL DEVELOPMENT
  # --------------------------------------------------------------------------

  docker:render:
    desc: "⚙️  RENDER: Generate all config files from infra/docker/config.yaml"
    dir: infra/
    cmds:
      - "{{.PYTHON_CMD}} scripts/render_config.py docker/config.yaml templates/config docker/config"
      - "{{.PYTHON_CMD}} scripts/render_config.py docker/config.yaml templates/envt docker/env"

  run:
    desc: "▶️  START DEV: Runs the local dev environment"
    cmds:
      - task: docker:render
      - "{{.DOCKER_CMD}} up --build"
      
  clean:
    desc: "🛑 STOP: Stops all containers and removes volumes"
    cmds:
      - "{{.DOCKER_CMD}} down --volumes --remove-orphans"

  restart:
    desc: "🔄 RESTART: Restart all containers"
    cmds:
      - task: clean
      - task: run
        
  build:
    desc: "🚀 BUILD: the docker compose environment"
    cmds:
      - task: docker:render
      - "{{.DOCKER_CMD}} build"

  # --------------------------------------------------------------------------
  # 3. TESTING
  # --------------------------------------------------------------------------

  test:integration:
    desc: "🧪 Run integration tests"
    dir: backend/src/harmony/tests
    env:
      API_ENDPOINT: http://localhost:8000
    cmds:
      - "{{.PYTEST_CMD}} -m integration"

  test:stress:
    desc: "🧪 Run stress tests"
    dir: backend/src/harmony/tests
    env:
      API_ENDPOINT: http://localhost:8000
    cmds:
      - "{{.PYTEST_CMD}} -m stress -s -v"

  data:generate:
    desc: "🎲 GENERATE: dummy data for the DB"
    dir: backend/src/harmony/tests/tools
    cmds:
      - "{{.PYTEST_CMD}} generate.py -s"

  data:clean:
    desc: "🎲 CLEAN: up generated test data from the database"
    dir: backend/src/harmony/tests/tools
    cmds:
      - rm -f generated_data.json

  # --------------------------------------------------------------------------
  # 4. CODE GENERATION & SYNC
  # --------------------------------------------------------------------------

  schema:sync:
    desc: "🔄 SYNC: Updates Frontend SDK based on Backend Code"
    summary: |
      Use this when you change the FastAPI Pydantic models.
      1. Extracts OpenAPI JSON from Backend.
      2. Generates TypeScript clients using Orval.
    cmds:
      - "{{.PYTHON_CMD}} backend/specs/extract_openapi.py > frontend/openapi.json"
      - cd frontend && npx orval

  env:freeze:
    desc: "🔄 FREEZE: Update environment.yaml from current setup"
    cmds:
      - 'conda run -n {{.CONDA_ENV}} conda env export --no-builds | grep -v -e "prefix: " -e "harmony-chat-api" > environment.yaml'

  env:compile:
    desc: "🔄 COMPILE: generate requirements.txt from pyproject.toml"
    dir: backend
    cmds:
      - conda run -n {{.CONDA_ENV}} pip-compile pyproject.toml --output-file requirements.txt

  # --------------------------------------------------------------------------
  # 5. KIND
  # --------------------------------------------------------------------------

  kind:cluster:create:
    desc: "☸️  K8S: Create the local kind cluster"
    cmds:
      - kind create cluster --config infra/k8s/kind-config.yaml --name {{.KIND_CLUSTER}}
    status:
      - kind get clusters | grep {{.KIND_CLUSTER}}

  kind:cluster:delete:
    desc: "☸️  K8S: Delete the local kind cluster"
    cmds:
      - kind delete cluster --name {{.KIND_CLUSTER}}

  # -------------------------- Image build + kind load ------------------------- #

  kind:build:backend:
    desc: "🐳 K8S: Build and load the backend image into kind"
    cmds:
      - docker build -t harmony-backend:local backend/
      - kind load docker-image harmony-backend:local --name {{.KIND_CLUSTER}}

  kind:build:init-dynamodb:
    desc: "🐳 K8S: Build and load the dynamodb-local image into kind"
    cmds:
      - docker build -t init-dynamodb:latest -f infra/docker/images/init-dynamodb/Dockerfile infra/
      - kind load docker-image init-dynamodb:latest --name {{.KIND_CLUSTER}}

  kind:build:all:
    desc: "🐳 K8S: Build and load ALL custom images into kind"
    cmds:
      - task: kind:build:backend
      - task: kind:build:init-dynamodb

  # --------------------------------------------------------------------------
  # 6. Helm deployments
  # --------------------------------------------------------------------------

  k8s:render:local:
    desc: "🔄 K8S: Render local jinja2 templates"
    dir: infra/
    cmds:
      - "{{.PYTHON_CMD}} scripts/render_config.py k8s/environments/local/config.yaml templates/config k8s/environments/local/config"
      - "{{.PYTHON_CMD}} scripts/render_config.py k8s/environments/local/config.yaml templates/envt k8s/environments/local/env"

  k8s:helm:repos:
    desc: "📦 K8S: Add and update all Helm chart repositories"
    cmds:
      - helm repo add bitnami https://charts.bitnami.com/bitnami
      - helm repo add centrifugal https://centrifugal.github.io/helm-charts
      - helm repo add redpanda https://charts.redpanda.com
      - helm repo add minio https://charts.min.io/
      - helm repo update

  k8s:deploy:
    desc: "🚀 K8S: Full deploy — build images + apply all Helm releases"
    cmds:
      - task: kind:build:all
      - task: k8s:apply

  k8s:apply:
    desc: "🚀 K8S: Apply Helm releases (helmfile sync)"
    dir: "{{.K8S_ENV_DIR}}"
    cmds:
      - task: k8s:render:local
      - "{{.HELMFILE_CMD}} sync"

  k8s:diff:
    desc: "🔍 K8S: Diff pending Helm changes"
    dir: "{{.K8S_ENV_DIR}}"
    cmds:
      - "{{.HELMFILE_CMD}} diff"

  k8s:destroy:
    desc: "🛑 K8S: Tear down all Helm releases (keeps cluster)"
    dir: "{{.K8S_ENV_DIR}}"
    cmds:
      - "{{.HELMFILE_CMD}} destroy"

  k8s:setup:
    desc: "🚀 K8S: setup cluster + repos + build + deploy"
    summary: |
      Runs the full local Kubernetes bootstrap:
        1. Creates the kind cluster
        2. Adds Helm repos
        3. Builds and loads all custom Docker images
        4. Deploys all releases via helmfile
    cmds:
      - task: kind:cluster:create
      - task: k8s:helm:repos
      - task: kind:build:all
      - task: k8s:apply

  k8s:teardown:
    desc: "🛑 K8S: Full teardown — destroy releases then delete cluster"
    cmds:
      - task: k8s:destroy
      - task: kind:cluster:delete