name: GitOps PR Environments

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'infra/k8s/**'

env:
  DEFAULT_AWS_REGION: us-east-1

jobs:
  manage-ephemeral-environment:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # Required for AWS OIDC assumption
      contents: read  # Required to checkout the code
      
    env:
      TARGET_ACCOUNT_ID: ${{ fromJson(vars.ACCOUNT_MAPPING)[github.actor] }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Validate Account Mapping
        run: |
          if [ -z "${{ env.TARGET_ACCOUNT_ID }}" ]; then
            echo "Error: No AWS Account mapping found for user ${{ github.actor }}."
            echo "Please ensure vars.ACCOUNT_MAPPING is configured correctly."
            exit 1
          fi
          echo "Mapped user ${{ github.actor }} to AWS Account ID ${{ env.TARGET_ACCOUNT_ID }}"

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::${{ env.TARGET_ACCOUNT_ID }}:role/GitHubActionsDeployRole-${{ env.TARGET_ACCOUNT_ID }}
          aws-region: ${{ env.DEFAULT_AWS_REGION }}

      - name: Log AWS Identity
        run: aws sts get-caller-identity

      - name: Install task
        uses: arduino/setup-task@v2

      - name: Install spacectl
        uses: spacelift-io/setup-spacectl@main
        with:
          version: '1.8.0'

      - name: Install SOPS
        uses: mdgreenwald/mozilla-sops-action@v1.6.0

      - name: Set Safe Actor Name
        run: |
          SAFE_USER=$(echo "${{ github.actor }}" | tr '[:lower:]' '[:upper:]' | tr '-' '_')
          echo "SAFE_ACTOR=$SAFE_USER" >> $GITHUB_ENV

      # ---------------------------------------------------------
      # On PR Open / Synchronize
      # ---------------------------------------------------------
      - name: GitOps - Provision Ephemeral PR Environment
        if: github.event.action != 'closed'
        env:
          SOPS_AGE_KEY: ${{ secrets[format('SOPS_AGE_KEY_{0}', env.SAFE_ACTOR)] }}
        run: |
          task spacelift:pr:provision PR_ID=${{ github.event.pull_request.number }} GITHUB_REPOSITORY=${{ github.repository }} GITHUB_HEAD_REF=${{ github.head_ref }}

      # ---------------------------------------------------------
      # On PR Close
      # ---------------------------------------------------------
      - name: GitOps - Teardown Ephemeral PR Environment
        if: github.event.action == 'closed'
        env:
          SOPS_AGE_KEY: ${{ secrets[format('SOPS_AGE_KEY_{0}', env.SAFE_ACTOR)] }}
        run: |
          task spacelift:pr:teardown PR_ID=${{ github.event.pull_request.number }}
