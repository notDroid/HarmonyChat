name: Monorepo Release

on:
  push:
    tags:
      - 'v*.*.*'

env:
  REGISTRY: ghcr.io

jobs:
  build-and-publish-images:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set lower case owner name
        run: |
          echo "ORG=${OWNER,,}" >> ${GITHUB_ENV}
        env:
          OWNER: '${{ github.repository_owner }}'

      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push Backend
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.ORG }}/harmony/backend:${{ github.ref_name }}
            ${{ env.REGISTRY }}/${{ env.ORG }}/harmony/backend:latest
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.ORG }}/harmony/backend:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.ORG }}/harmony/backend:buildcache,mode=max

      - name: Build and push Frontend
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.ORG }}/harmony/frontend:${{ github.ref_name }}
            ${{ env.REGISTRY }}/${{ env.ORG }}/harmony/frontend:latest
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.ORG }}/harmony/frontend:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.ORG }}/harmony/frontend:buildcache,mode=max

      - name: Build and push init-dynamodb image
        uses: docker/build-push-action@v7
        with:
          context: ./infra
          file: ./infra/docker/images/init-dynamodb/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.ORG }}/harmony/init-dynamodb:${{ github.ref_name }}
            ${{ env.REGISTRY }}/${{ env.ORG }}/harmony/init-dynamodb:latest
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.ORG }}/harmony/init-dynamodb:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.ORG }}/harmony/init-dynamodb:buildcache,mode=max
          
  create-github-release:
    needs: build-and-publish-images
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true