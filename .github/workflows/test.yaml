name: API Integration Tests

on:
  push:
    branches: ["main"]
    paths:
      - "backend/src/harmony/**"
  pull_request:
    branches: ["main"]
    paths:
      - "backend/src/harmony/**"

jobs:
  integration-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true

      - name: Install go-task
        uses: go-task/setup-task@v2
        with:
          version: 3.x

      - name: Install backend dependencies
        run: task setup:backend

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build backend image
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          push: false
          tags: my-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Render Docker configuration files
        run: task docker:render

      - name: Start Docker Compose environment
        run: |
          docker compose \
            --project-directory . \
            --env-file infra/docker/env/.env \
            -f infra/docker/docker-compose.yaml \
            up -d --build --wait

      - name: Run Integration Tests
        run: task test:integration