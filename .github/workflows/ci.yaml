name: Integration Tests CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  integration-tests:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install go-task
        uses: arduino/setup-task@v2
        with:
          version: 3.x

      - name: Install backend dependencies (which includes test dependencies)
        run: task setup:backend

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers and images
        uses: ScribeMD/docker-cache@0.5.0
        with:
          key: docker-cache-${{ runner.os }}-${{ hashFiles('infra/docker/docker-compose.yaml', 'backend/**', 'frontend/**') }}

      - name: Render Docker configuration files
        run: task docker:render

      - name: Start Docker Compose environment
        run: |
          docker compose \
            --project-directory . \
            --env-file infra/docker/env/.env \
            -f infra/docker/docker-compose.yaml \
            up -d --build --wait
            
      - name: Run Integration Tests
        run: task test:integration