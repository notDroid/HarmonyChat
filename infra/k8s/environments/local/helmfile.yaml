environments:
  local:
    values:
      - config.yaml

helmDefaults:
  createNamespace: true
  cleanupOnFail: false
  wait: true
  timeout: 600

repositories:
  - name: bitnami
    url: https://charts.bitnami.com/bitnami
  - name: minio
    url: https://charts.min.io/
  - name: redpanda
    url: https://charts.redpanda.com
  - name: centrifugal
    url: https://centrifugal.github.io/helm-charts

---

releases:
  - name: minio
    namespace: harmony
    chart: minio/minio
    values:
      - values/minio.yaml.gotmpl
    wait: true

  - name: automq
    namespace: harmony
    chart: oci://registry-1.docker.io/bitnamicharts/kafka
    version: 31.5.0
    values:
      - values/automq.yaml.gotmpl
    needs:
      - harmony/minio
    wait: true

  - name: postgresql
    namespace: harmony
    chart: bitnami/postgresql
    values:
      - values/postgres.yaml.gotmpl
    wait: true

  - name: redis
    namespace: harmony
    chart: bitnami/redis
    values:
      - values/redis.yaml.gotmpl
    wait: true

  - name: dynamodb-local
    namespace: harmony
    chart: ../../charts/dynamodb-local
    values:
      - values/dynamodb-local.yaml.gotmpl
    wait: true

  - name: consumer
    namespace: harmony
    chart: ../../charts/harmony
    values:
      - values/consumer.yaml.gotmpl
    set:
      - name: envFileContent
        file: env/.env.consumer
    needs:
      - harmony/automq
      - harmony/redis
      - harmony/dynamodb-local
    wait: true

  - name: backend
    namespace: harmony
    chart: ../../charts/harmony
    values:
      - values/backend.yaml.gotmpl
    set:
      - name: envFileContent
        file: env/.env.api
    needs:
      - harmony/postgresql
      - harmony/redis
      - harmony/automq
      - harmony/dynamodb-local
    wait: true

  - name: centrifugo
    namespace: harmony
    chart: centrifugal/centrifugo
    values:
      - values/centrifugo.yaml.gotmpl
    needs:
      - harmony/redis
      - harmony/automq
    wait: true

