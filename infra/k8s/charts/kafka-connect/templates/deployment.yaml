apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kafka-connect.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kafka-connect.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "kafka-connect.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "kafka-connect.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: kafka-connect
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: rest
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          env:
            - name: CONNECT_BOOTSTRAP_SERVERS
              value: {{ .Values.env.bootstrapServers | quote }}
            - name: CONNECT_REST_ADVERTISED_HOST_NAME
              value: {{ include "kafka-connect.fullname" . | quote }}
            - name: CONNECT_REST_PORT
              value: {{ .Values.service.port | quote }}
            - name: CONNECT_GROUP_ID
              value: {{ .Values.env.groupId | quote }}
            - name: CONNECT_CONFIG_STORAGE_TOPIC
              value: {{ .Values.env.configStorageTopic | quote }}
            - name: CONNECT_OFFSET_STORAGE_TOPIC
              value: {{ .Values.env.offsetStorageTopic | quote }}
            - name: CONNECT_STATUS_STORAGE_TOPIC
              value: {{ .Values.env.statusStorageTopic | quote }}
            - name: CONNECT_CONFIG_STORAGE_REPLICATION_FACTOR
              value: "1"
            - name: CONNECT_OFFSET_STORAGE_REPLICATION_FACTOR
              value: "1"
            - name: CONNECT_STATUS_STORAGE_REPLICATION_FACTOR
              value: "1"
            - name: CONNECT_KEY_CONVERTER
              value: "org.apache.kafka.connect.storage.StringConverter"
            - name: CONNECT_VALUE_CONVERTER
              value: "org.apache.kafka.connect.json.JsonConverter"
            - name: CONNECT_VALUE_CONVERTER_SCHEMAS_ENABLE
              value: "false"
            - name: CONNECT_PLUGIN_PATH
              value: {{ .Values.env.pluginPath | quote }}
            - name: AWS_ACCESS_KEY_ID
              value: {{ .Values.aws.accessKeyId | quote }}
            - name: AWS_SECRET_ACCESS_KEY
              value: {{ .Values.aws.secretAccessKey | quote }}
            - name: AWS_REGION
              value: {{ .Values.aws.region | quote }}
            - name: CONNECT_LOG4J_LOGGERS
              value: "io.debezium=DEBUG,org.apache.kafka.connect=DEBUG"
          livenessProbe:
            httpGet:
              path: /connectors
              port: rest
            initialDelaySeconds: 45
            periodSeconds: 15
            failureThreshold: 6
          readinessProbe:
            httpGet:
              path: /connectors
              port: rest
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 6
          {{- if .Values.resources }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          {{- end }}