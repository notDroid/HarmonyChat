apiVersion: apps/v1
kind: StatefulSet
metadata:
  namespace: {{ .Release.Namespace }}
  name: {{ include "dynamodb-local.fullname" . }}
  labels:
    {{- include "dynamodb-local.labels" . | nindent 4 }}
spec:
  replicas: 1
  serviceName: {{ include "dynamodb-local.fullname" . }}
  selector:
    matchLabels:
      {{- include "dynamodb-local.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "dynamodb-local.selectorLabels" . | nindent 8 }}
    spec:
      # DynamoDB Local writes to /data — needs write permission
      securityContext:
        runAsUser: 0
      containers:
        - name: dynamodb-local
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: {{ toJson .Values.args }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
            timeoutSeconds: 5
            periodSeconds: 10
            failureThreshold: 5
          {{- if .Values.persistence.enabled }}
          volumeMounts:
            - name: data
              mountPath: /data
          {{- end }}
          {{- if .Values.resources }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          {{- end }}
  {{- if .Values.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- if .Values.persistence.storageClass }}
        storageClassName: {{ .Values.persistence.storageClass | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.persistence.size }}
  {{- end }}
