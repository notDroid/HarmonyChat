{{- if eq .Values.environment "local" }}
apiVersion: v1
kind: Secret
metadata:
  namespace: {{ .Release.Namespace }}
  name: s3-auth-secret
  type: Opaque
stringData:
  access_key: {{ .Values.secrets.s3.access_key | quote }}
  secret_key: {{ .Values.secrets.s3.secret_key | quote }}
{{- else }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  namespace: {{ .Release.Namespace }}
  name: s3-auth-secret-es
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore
  target:
    name: s3-auth-secret
    creationPolicy: Owner
  data:
    - secretKey: access_key
      remoteRef:
        key: {{ .Values.infra.secrets.manager_name }}
        property: s3.access_key
    - secretKey: secret_key
      remoteRef:
        key: {{ .Values.infra.secrets.manager_name }}
        property: s3.secret_key
{{- end }}