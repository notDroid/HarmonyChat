replicaCount: 1

image:
  repository: harmony-backend
  tag: local
  pullPolicy: Never

command: []
args: []

env: {}
secretEnv: []

service:
  enabled: false
  type: ClusterIP
  port: 8000
  nodePort: null

livenessProbe: {}
readinessProbe: {}

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80