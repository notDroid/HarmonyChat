# ── Application ───────────────────────────────────────────────────────────────
app_env: development

# ── AWS ───────────────────────────────────────────────────────────────────────
aws:
  access_key_id: test
  secret_access_key: test
  region: us-east-1

# ── Postgres ──────────────────────────────────────────────────────────────────
postgres:
  hostname: postgres
  port: "5432"
  user: harmony
  password: harmony
  dbname: harmony

# ── Kafka ─────────────────────────────────────────────────────────────────────
kafka:
  brokers: "kafka:29092"
  connect_bootstrap: "kafka:29092"

# ── Redis ─────────────────────────────────────────────────────────────────────
redis:
  address: "redis:6379"

# ── DynamoDB ──────────────────────────────────────────────────────────────────
dynamodb:
  endpoint: "http://dynamodb:8000"
  chat_history_table_name: ChatHistory

# ── Internal service endpoints ────────────────────────────────────────────────
endpoints:
  api: "http://api:8000"
  kafka_connect: "http://kafka-connect:8083"

# ── Centrifugo ────────────────────────────────────────────────────────────────
centrifugo:
  api_key: test-cent-api-key
  admin_password: admin
  admin_secret: admin
  allowed_origins: ["*"]
  chat:
    presence_enabled: true
    history_size: 100
    history_ttl: "3600s"

# ── Consumer service ──────────────────────────────────────────────────────────
consumer:
  name: "Harmony CDC Worker Local"