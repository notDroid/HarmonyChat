networks:
  harmony-net:
    driver: bridge

services:
  # ------------------------------ App ------------------------------ #
  api:
    build: backend
    container_name: backend
    networks:
      - harmony-net
    env_file:
      - infra/docker/env/.env.api
    environment:
      AUTH__SECRET_KEY: ${AUTH_SECRET_KEY}
      AWS__ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS__SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      POSTGRES__URL: ${POSTGRES_URL}
    depends_on:
      redis:
        condition: service_healthy
      dynamodb:
        condition: service_healthy
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      init-dynamodb:
        condition: service_completed_successfully
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl http://localhost:8000/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    # restart: unless-stopped

  consumer:
    build: backend
    container_name: consumer
    networks:
      - harmony-net
    env_file:
      - infra/docker/env/.env.consumer
    environment:
      AWS__ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS__SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      POSTGRES__URL: ${POSTGRES_URL}
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      dynamodb:
        condition: service_healthy
    command: python -m harmony.consumer.main

  frontend:
    build: 
      context: frontend
      args:
        - NEXT_PUBLIC_CENTRIFUGE_URL=ws://localhost:8010/connection/websocket
    container_name: frontend
    profiles: ["ui"]
    networks:
      - harmony-net
    environment:
      - INTERNAL_API_ENDPOINT=${API_ENDPOINT}
    depends_on:
      api:
        condition: service_started
    ports:
      - "3000:3000"

  centrifugo:
    image: centrifugo/centrifugo:v6
    container_name: centrifugo
    networks:
      - harmony-net
    environment:
      CENTRIFUGO_API_KEY: ${CENTRIFUGO_API_KEY}
      CENTRIFUGO_ADMIN_PASSWORD: ${CENTRIFUGO_ADMIN_PASSWORD}
      CENTRIFUGO_ADMIN_SECRET: ${CENTRIFUGO_ADMIN_SECRET}
    volumes:
      - ./infra/docker/config/centrifugo-config.json:/centrifugo/config.json
    command: centrifugo -c /centrifugo/config.json
    ports:
      - "8010:8000"
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  # ------------------------------ Stateful Components ------------------------------ #
  postgres:
    image: postgres:15-alpine
    container_name: postgres
    networks:
      - harmony-net
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    command: postgres -c wal_level=logical
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  dynamodb:
    image: amazon/dynamodb-local
    container_name: dynamodb
    networks:
      - harmony-net
    user: root
    command: "-jar DynamoDBLocal.jar -sharedDb -dbPath ./data -cors *"
    volumes:
      - dynamodb_data:/home/dynamodblocal/data
    healthcheck:
       test: ["CMD-SHELL", "curl http://localhost:8000 || exit 1"]
       interval: 5s
       timeout: 5s
       retries: 5

  redis:
    image: redis:alpine
    container_name: redis
    networks:
      - harmony-net
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: minio
    networks:
      - harmony-net
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

  init-minio:
    image: minio/mc:latest
    container_name: init-minio
    networks:
      - harmony-net
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set minio http://minio:9000 ${S3_ACCESS_KEY} ${S3_SECRET_KEY};
      /usr/bin/mc mb minio/${S3_AUTOMQ_DATA_BUCKET} --ignore-existing;
      /usr/bin/mc mb minio/${S3_AUTOMQ_OPS_BUCKET} --ignore-existing;
      /usr/bin/mc anonymous set public minio/${S3_AUTOMQ_DATA_BUCKET};
      /usr/bin/mc anonymous set public minio/${S3_AUTOMQ_OPS_BUCKET};
      "

  # ------------------------------ Event Architecture ------------------------------ #
  kafka:
    image: automqinc/automq:latest
    container_name: kafka
    networks:
      - harmony-net
    ports:
      - "29092:29092" 
    environment:
      KAFKA_S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      KAFKA_S3_SECRET_KEY: ${S3_SECRET_KEY}
      KAFKA_S3_DATA_URL: ${KAFKA_S3_DATA_URL}
      KAFKA_S3_OPS_URL: ${KAFKA_S3_OPS_URL}
      CLUSTER_ID: ${KAFKA_CLUSTER_ID}
      KAFKA_HEAP_OPTS: ${KAFKA_HEAP_OPTS:--Xms1g -Xmx2g -XX:MetaspaceSize=96m -XX:MaxDirectMemorySize=1G}
    command:
      - bash
      - -c
      - >
        /opt/automq/kafka/bin/kafka-server-start.sh
        /opt/automq/kafka/config/kraft/server.properties
        --override cluster.id=$${CLUSTER_ID}
        --override node.id=0
        --override process.roles=broker,controller
        --override controller.quorum.voters=0@localhost:9093
        --override listeners=INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093
        --override advertised.listeners=INTERNAL://kafka:9092,EXTERNAL://localhost:29092,CONTROLLER://localhost:9093
        --override listener.security.protocol.map=INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
        --override inter.broker.listener.name=INTERNAL
        --override controller.listener.names=CONTROLLER
        --override s3.data.buckets="0@$${KAFKA_S3_DATA_URL}"
        --override s3.ops.buckets="0@$${KAFKA_S3_OPS_URL}"
        --override s3.wal.path="0@$${KAFKA_S3_DATA_URL}"
    healthcheck:
      test: 
        - "CMD-SHELL"
        - "/opt/automq/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 || exit 1"
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    depends_on:
      init-minio:
        condition: service_completed_successfully

  connect-cdc:
    image: conduit.docker.scarf.sh/conduitio/conduit:latest
    container_name: connect-cdc
    networks:
      - harmony-net
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./infra/docker/config/postgres-cdc.yaml:/app/pipelines/postgres-cdc.yaml:ro
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      dynamodb:
        condition: service_healthy
      api:
        condition: service_healthy
    restart: unless-stopped

  connect-dynamodb:
    image: docker.redpanda.com/redpandadata/connect:latest
    container_name: connect-dynamodb
    networks:
      - harmony-net
    environment:
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
    depends_on:
      kafka:
        condition: service_healthy
      dynamodb:
        condition: service_healthy
      api:
        condition: service_healthy
    volumes:
      - ./infra/docker/config/dynamodb-sink.yaml:/connect.yaml:ro
    command: ["run", "/connect.yaml"]

  # ------------------------------ Misc. ------------------------------ #

  kafbat-ui:
    image: ghcr.io/kafbat/kafka-ui:latest
    container_name: kafbat-ui
    networks:
      - harmony-net
    ports:
      - "8080:8080"
    environment:
      - KAFKA_CLUSTERS_0_NAME=harmony-cluster
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=${KAFKA_FULLNAME}
    depends_on:
      kafka:
        condition: service_healthy

  init-dynamodb:
    build:
      context: infra/
      dockerfile: docker/images/init-dynamodb/Dockerfile
    container_name: init-dynamodb
    networks:
      - harmony-net
    depends_on:
      dynamodb:
        condition: service_healthy
    environment:
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION}
      DYNAMODB_ENDPOINT: ${DYNAMODB_ENDPOINT}
      TABLE_FILE: /config/dynamodb-tables.json
    volumes:
      - ./infra/docker/config:/config:ro

volumes:
  postgres_data:
  dynamodb_data:
  redis_data:
  minio_data:
  automq_data: