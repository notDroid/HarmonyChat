networks:
  harmony-net:
    driver: bridge

services:
  api:
    build: backend
    container_name: backend
    networks:
      - harmony-net
    env_file:
      - infra/docker/env/.env.api
    depends_on:
      redis:
        condition: service_healthy
      dynamodb:
        condition: service_healthy
      postgres:
        condition: service_healthy
      init-dynamodb:
        condition: service_completed_successfully
    ports:
      - "8000:8000"

  consumer:
    build: backend
    container_name: consumer
    networks:
      - harmony-net
    env_file:
      - infra/docker/env/.env.consumer
    depends_on:
      redpanda:
        condition: service_healthy
      redis:
        condition: service_healthy
      dynamodb:
        condition: service_healthy
    command: python -m harmony.consumer.main

  frontend:
    build: 
      context: frontend
      args:
        - NEXT_PUBLIC_CENTRIFUGE_URL=ws://localhost:8010/connection/websocket
    container_name: frontend
    profiles: ["ui"]
    networks:
      - harmony-net
    environment:
      - INTERNAL_API_ENDPOINT=${API_ENDPOINT}
    depends_on:
      api:
        condition: service_started
    ports:
      - "3000:3000"

  postgres:
    image: postgres:15-alpine
    container_name: postgres
    networks:
      - harmony-net
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    command: postgres -c wal_level=logical
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  dynamodb:
    image: amazon/dynamodb-local
    container_name: dynamodb
    networks:
      - harmony-net
    user: root
    command: "-jar DynamoDBLocal.jar -sharedDb -dbPath ./data -cors *"
    volumes:
      - dynamodb_data:/home/dynamodblocal/data
    ports:
      - "8005:8000"
    healthcheck:
       test: ["CMD-SHELL", "curl http://localhost:8000 || exit 1"]
       interval: 5s
       timeout: 5s
       retries: 5

  redis:
    image: redis:alpine
    container_name: redis
    networks:
      - harmony-net
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  centrifugo:
    image: centrifugo/centrifugo:v6
    container_name: centrifugo
    networks:
      - harmony-net
    volumes:
      - ./infra/docker/config/centrifugo-config.json:/centrifugo/config.json
    command: centrifugo -c /centrifugo/config.json
    ports:
      - "8010:8000"
    depends_on:
      redis:
        condition: service_healthy

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:latest
    container_name: redpanda
    networks:
      - harmony-net
    command:
      - redpanda
      - start
      - --kafka-addr internal://0.0.0.0:29092,external://0.0.0.0:9092
      - --advertise-kafka-addr internal://redpanda:29092,external://localhost:9092
      - --pandaproxy-addr internal://0.0.0.0:28082,external://0.0.0.0:8082
      - --advertise-pandaproxy-addr internal://redpanda:28082,external://localhost:8082
      - --schema-registry-addr internal://0.0.0.0:28081,external://0.0.0.0:8081
      - --mode dev-container
      - --smp 1
      - --memory 1G
    ports:
      - "9092:9092"
      - "8081:8081"
      - "8082:8082"
    volumes:
      - redpanda_data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health"]
      interval: 5s
      timeout: 3s
      retries: 5

  kafka-connect:
    build:
      context: infra/docker/images/kafka-connect
    container_name: kafka-connect
    networks:
      - harmony-net
    depends_on:
      redpanda:
        condition: service_healthy
      dynamodb:
        condition: service_healthy
    environment:
      CONNECT_BOOTSTRAP_SERVERS: redpanda:29092
      CONNECT_REST_ADVERTISED_HOST_NAME: kafka-connect
      CONNECT_REST_PORT: 8083
      CONNECT_GROUP_ID: compose-connect-group
      CONNECT_CONFIG_STORAGE_TOPIC: docker-connect-configs
      CONNECT_OFFSET_STORAGE_TOPIC: docker-connect-offsets
      CONNECT_STATUS_STORAGE_TOPIC: docker-connect-status
      CONNECT_CONFIG_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_OFFSET_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_STATUS_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_KEY_CONVERTER: org.apache.kafka.connect.storage.StringConverter
      CONNECT_VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      CONNECT_VALUE_CONVERTER_SCHEMAS_ENABLE: "false"
      CONNECT_PLUGIN_PATH: "/usr/share/java,/usr/share/confluent-hub-components"
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/connectors"]
      interval: 5s
      timeout: 5s
      retries: 5

  redpanda-console:
    image: docker.redpanda.com/redpandadata/console:latest
    container_name: redpanda-console
    networks:
      - harmony-net
    ports:
      - "8080:8080"
    environment:
      KAFKA_BROKERS: ${KAFKA_FULLNAME}
    depends_on:
      redpanda:
        condition: service_healthy

  init-dynamodb:
    build:
      context: infra/
      dockerfile: docker/images/init-dynamodb/Dockerfile
    container_name: init-dynamodb
    networks:
      - harmony-net
    depends_on:
      dynamodb:
        condition: service_healthy
    environment:
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION}
      DYNAMODB_ENDPOINT: ${DYNAMODB_ENDPOINT}
      TABLE_FILE: /config/dynamodb-tables.json
    volumes:
      - ./infra/docker/config:/config:ro

  init-kafka-connect:
    image: curlimages/curl:latest
    container_name: init-kafka-connect
    networks:
      - harmony-net
    depends_on:
      kafka-connect:
        condition: service_healthy
    environment:
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION}
      CONNECT_URL: ${CONNECT_URL}
    volumes:
      - ./infra/docker/config:/config:ro
      - ./infra/scripts/init_connectors.sh:/init_connectors.sh:ro
    command: ["sh", "/init_connectors.sh"]

volumes:
  postgres_data:
  dynamodb_data:
  redis_data:
  redpanda_data: